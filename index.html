<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>家族のこんだて（共有版）</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%231C2B22%22/><text x=%2250%22 y=%2265%22 font-size=%2255%22 text-anchor=%22middle%22 fill=%22%23E8A33D%22>膳</text></svg>" />
<style>
  html, body { margin: 0; padding: 0; background: #FFFBF6; color: #2B231D; font-family: sans-serif; }
  * { box-sizing: border-box; }
  .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; text-align: center; }
  .btn { padding: 12px 24px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; margin: 10px 0; width: 100%; max-width: 300px; transition: opacity 0.2s; }
  .btn:active { opacity: 0.7; }
  .btn-primary { background: #FF7A1A; color: white; }
  .btn-outline { background: transparent; border: 2px solid #FF7A1A; color: #FF7A1A; }
  .input-field { width: 100%; max-width: 300px; padding: 12px; border: 1px solid #F0DFCB; border-radius: 8px; margin-bottom: 10px; font-size: 16px; outline: none; }
  .loading { color: #9C897A; font-size: 14px; }
</style>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<!-- React & Babel -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// Firebase設定（新しいプロジェクトのもの）
const firebaseConfig = {
  apiKey: "AIzaSyBmpmFATX_-GupRJisoBklmXpPA_XD_x4E",
  authDomain: "kondate-family-test.firebaseapp.com",
  databaseURL: "https://kondate-family-test-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kondate-family-test",
  storageBucket: "kondate-family-test.firebasestorage.app",
  messagingSenderId: "411952546498",
  appId: "1:411952546498:web:225b8c1de30362a4db315b"
};

// 初期化
if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const auth = firebase.auth();
const db = firebase.database();

const { useState, useEffect } = React;

function App() {
  const [user, setUser] = useState(null);
  const [familyId, setFamilyId] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    return auth.onAuthStateChanged(async (u) => {
      if (u) {
        setUser(u);
        const snap = await db.ref(`users/${u.uid}/familyId`).get();
        if (snap.exists()) {
          setFamilyId(snap.val());
        }
      } else {
        setUser(null);
        setFamilyId(null);
      }
      setLoading(false);
    });
  }, []);

  const login = () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(err => {
      // モバイルでポップアップがブロックされる場合はRedirectに切り替え
      auth.signInWithRedirect(provider);
    });
  };

  const createFamily = async () => {
    const newId = Math.random().toString(36).slice(2, 10).toUpperCase();
    await updateFamilyId(newId);
  };

  const joinFamily = async (id) => {
    if (!id) return;
    await updateFamilyId(id.trim().toUpperCase());
  };

  const updateFamilyId = async (id) => {
    await db.ref(`users/${user.uid}/familyId`).set(id);
    setFamilyId(id);
  };

  if (loading) return <div className="login-screen loading">読み込み中...</div>;

  if (!user) {
    return (
      <div className="login-screen">
        <h1 style={{color:'#FF7A1A', marginBottom: '10px'}}>家族のこんだて</h1>
        <p style={{fontSize:'14px', color:'#9C897A', marginBottom: '30px'}}>家族で共有するためにログインしてください</p>
        <button className="btn btn-primary" onClick={login}>Googleでログイン</button>
      </div>
    );
  }

  if (!familyId) {
    return <FamilySetup onCreate={createFamily} onJoin={joinFamily} />;
  }

  return <MealPlannerMain user={user} familyId={familyId} onLogout={() => auth.signOut()} />;
}

function FamilySetup({ onCreate, onJoin }) {
  const [input, setInput] = useState("");
  return (
    <div className="login-screen">
      <h2 style={{fontSize: '20px'}}>家族グループ設定</h2>
      <button className="btn btn-primary" onClick={onCreate}>新しく家族グループを作る</button>
      <div style={{margin:'20px 0', color:'#9C897A', fontSize: '14px'}}>または</div>
      <p style={{fontSize:'14px', marginBottom: '10px'}}>招待コードを入力して参加する：</p>
      <input 
        className="input-field" 
        placeholder="例: AB123XYZ" 
        value={input} 
        onChange={e => setInput(e.target.value)}
      />
      <button className="btn btn-outline" onClick={() => onJoin(input)}>グループに参加</button>
    </div>
  );
}

function MealPlannerMain({ user, familyId, onLogout }) {
  return (
    <div>
      <div style={{padding:'12px', background:'#FFE9D6', fontSize:'12px', display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom: '1px solid #F0DFCB'}}>
        <span>家族ID: <strong>{familyId}</strong></span>
        <button onClick={onLogout} style={{border:'none', background:'none', color:'#9C897A', textDecoration:'underline', cursor:'pointer'}}>ログアウト</button>
      </div>
      <div style={{padding:'40px 20px', textAlign:'center'}}>
        <div style={{fontSize: '50px', marginBottom: '20px'}}>🎉</div>
        <h3 style={{color: '#FF7A1A'}}>家族グループに接続しました</h3>
        <p style={{fontSize: '14px', lineHeight: '1.6', color: '#666'}}>
          この画面が表示されていれば、ログインと共有の仕組みは成功です！<br/><br/>
          あとは、あなたが今改修している「元アプリの最新コード」をここに流し込めば完成です。
        </p>
        <div style={{marginTop: '30px', padding: '15px', background: '#FFF', borderRadius: '10px', border: '1px dashed #CCC', fontSize: '12px', color: '#9C897A'}}>
          招待する家族にもこのURLを教えて、<br/>
          招待コード「<strong>{familyId}</strong>」を入力してもらってください。
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
