<script>
  window.__pendingErrors = [];
  function __showError(msg) {
    if (!document.body) {
      window.__pendingErrors.push(msg);
      return;
    }
    var el = document.getElementById("__error_banner__");
    if (!el) {
      el = document.createElement("div");
      el.id = "__error_banner__";
      el.style.cssText =
        "position:fixed;top:0;left:0;right:0;background:#D1553B;color:#fff;padding:10px 14px;" +
        "font-size:12px;font-family:monospace;z-index:99999;white-space:pre-wrap;line-height:1.5;";
      document.body.appendChild(el);
    }
    el.textContent += msg + "\n";
  }
  window.addEventListener(
    "unhandledrejection",
    function (e) {
      var msg = (e.reason && (e.reason.message || e.reason.code)) || String(e.reason);
      __showError("エラー(Promise): " + msg);
    }
  );
  window.addEventListener(
    "error",
    function (e) {
      var msg = e.message || (e.error && e.error.message) || String(e);
      var src = e.filename ? "\n(" + e.filename + ":" + e.lineno + ")" : "";
      __showError("エラー: " + msg + src);
    },
    true
  );
  document.addEventListener("DOMContentLoaded", function () {
    window.__pendingErrors.forEach(__showError);
    window.__pendingErrors = [];
  });
</script>

function toISODate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function sundayOf(date) {
  const d = new Date(date);
  const dow = d.getDay();
  d.setDate(d.getDate() - dow);
  d.setHours(0, 0, 0, 0);
  return d;
}

function addDays(date, n) {

// --- 3. 認証 & 家族ID管理を行うコントローラーコンポーネント ---
function App() {
  const [user, setUser] = useState(null);
  const [familyId, setFamilyId] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    return auth.onAuthStateChanged(async (u) => {
      if (u) {
        setUser(u);
        const snap = await db.ref(`users/${u.uid}/familyId`).get();
        if (snap.exists()) {
          setFamilyId(snap.val());
        }
      } else {
        setUser(null);
        setFamilyId(null);
      }
      setLoading(false);
    });
  }, []);

  const login = () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(() => {
      auth.signInWithRedirect(provider);
    });
  };

  const createFamily = async () => {
    // 0, O, 1, I, L など見分けがつきにくい文字を除外した文字種
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let newId = "";
    for (let i = 0; i < 6; i++) {
      newId += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    await db.ref(`users/${user.uid}/familyId`).set(newId);
    setFamilyId(newId);
  };

  const joinFamily = async (id) => {
    if (!id) return;
    const cleanId = id.trim().toUpperCase();
    await db.ref(`users/${user.uid}/familyId`).set(cleanId);
    setFamilyId(cleanId);
  };

  const resetFamilyId = async () => {
    if (!user) return;
    if (confirm("本当にこの家族グループを抜けますか？\n（献立データは削除されませんが、招待コードを入力し直す画面に戻ります）")) {
      await db.ref(`users/${user.uid}/familyId`).remove();
      setFamilyId(null);
    }
  };

  if (loading) {
    return (
      <div style={{ ...styles.app, alignItems: "center", justifyContent: "center", display: "flex", height: "100vh" }}>
        <Loader2 className="spin" size={28} color={C.mustard} />
        <style>{`.spin{animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      </div>
    );
  }

  if (!user) {
    return (
      <div className="auth-screen">
        <h1 style={{ color: '#FF7A1A', marginBottom: '10px' }}>家族のこんだて</h1>
        <p style={{ fontSize: '14px', color: '#9C897A', marginBottom: '30px' }}>家族共有のためにログインしてください</p>
        <button className="auth-btn auth-btn-primary" onClick={login}>Googleでログイン</button>
      </div>
    );
  }

  if (!familyId) {
    return <FamilySetup onCreate={createFamily} onJoin={joinFamily} onLogout={() => auth.signOut()} />;
  }

  return (
    <MealPlanner
      familyId={familyId}
      user={user}
      onLogout={() => auth.signOut()}
      onResetFamily={resetFamilyId}
    />
  );
}

        (r.ingredients || []).forEach((ing) => {

          if (!agg[key]) agg[key] = [];
          if (ing.amount) agg[key].push(ing.amount);
        });
      });
    });
    return Object.entries(agg).map(([name, amounts]) => ({ name, amounts, category: categorize(name) }));
  }, [week, recipeMap]);

  function assignSlot(wk, day, slotKey, recipeId) {
    setPlanByWeek((pbw) => {

  }

  function clearSlot(wk, day, slotKey) {

      const w = pbw[wk] || emptyWeek();
      return { ...pbw, [wk]: { ...w, [day]: { ...w[day], [slotKey]: null } } };
    });
  }

  function bulkImportRecipes(text) {
    const names = text.split(/[\n,、]/).map((s) => s.trim()).filter(Boolean);
    const existing = new Set(recipes.map((r) => r.name));
    const toAdd = [];
    names.forEach((name) => {
      if (!existing.has(name)) {
        existing.add(name);
        toAdd.push({ id: uid(), name, ingredients: [] });
      }
    });
    if (toAdd.length) setRecipes((rs) => [...rs, ...toAdd]);
    setImportOpen(false);
  }

  function mergePhotoRecipes(extracted) {
    const existing = new Set(recipes.map((r) => r.name));
    const toAdd = [];
    extracted.forEach((r) => {
      const name = (r.name || "").trim();
      if (!name || existing.has(name)) return;
      existing.add(name);
      const ingredients = Array.isArray(r.ingredients)
        ? r.ingredients
            .map((i) => ({ id: uid(), name: (i.name || "").trim(), amount: (i.amount || "").trim() }))
            .filter((i) => i.name)
        : [];
      toAdd.push({ id: uid(), name, ingredients });
    });
    if (toAdd.length) setRecipes((rs) => [...rs, ...toAdd]);
    return toAdd.length;
  }

  function saveRecipe(form) {
    if (!form.name.trim()) return;
    const cleanIngredients = form.ingredients.filter((i) => i.name.trim());
    if (form.id) {
      setRecipes((rs) => rs.map((r) => r.id === form.id ? { ...form, ingredients: cleanIngredients } : r));
    } else {
      setRecipes((rs) => [...rs, { id: uid(), name: form.name.trim(), ingredients: cleanIngredients, category: form.category || null }]);
    }

  }

  // レシピ削除
  function deleteRecipe(id) {
    setRecipes((rs) => rs.filter((r) => r.id !== id));
    setPlanByWeek((pbw) => {
      const next = {};
      Object.entries(pbw).forEach(([wk, w]) => {
        const nw = { ...w };
        DAYS.forEach((d) => {
          SLOTS.forEach((s) => {
            var _a;
            if (((_a = nw[d]) == null ? void 0 : _a[s.key]) === id) nw[d] = { ...nw[d], [s.key]: null };
          });
        });
        next[wk] = nw;
      });
      return next;
    });
  }

  function toggleCheck(key) {
    setChecked((c) => {

      if (next[key]) {

      }
      return next;
    });
  }

  function addExtra() {
    if (!newExtra.trim()) return;
    const text = newExtra.trim();
    setExtraItems((items) => [...items, { id: uid(), text, category: categorize(text) }]);
    setNewExtra("");
  }

  function removeExtra(id) {
    setExtraItems((items) => items.filter((i) => i.id !== id));
  }

  useEffect(() => {
    if (!loaded) return;
    const ONE_DAY = 24 * 60 * 60 * 1e3;
    function cleanup() {
      const now = Date.now();
      setChecked((c) => {
        let changed = false;
        const next = { ...c };
        Object.keys(next).forEach((k) => {
          if (typeof next[k] === "number" && now - next[k] > ONE_DAY) {
            delete next[k];
            changed = true;
          }
        });
        return changed ? next : c;
      });
      setExtraItems((items) =>
        items.filter((item) => {
          const ts = checked[safeCheckKey(item.text.trim())];
          return !(typeof ts === "number" && now - ts > ONE_DAY);
        })
      );
    }
    cleanup();
    const timer = setInterval(cleanup, 60 * 60 * 1e3);
    return () => clearInterval(timer);
  }, [loaded, checked]);

  return (
    <div style={styles.app}>
      <link rel="preconnect" href="https://fonts.googleapis.com" />

          />
        )}
        {tab === "recipes" && (
          <RecipesView
            recipes={recipes}
            onEdit={(r) => setRecipeForm({ category: null, ...r })}
            onNew={() => setRecipeForm({ id: null, name: "", category: null, ingredients: [{ id: uid(), name: "", amount: "" }] })}
            onImport={() => setImportOpen(true)}
            onPhotoImport={() => setPhotoImportOpen(true)}

        {tab === "shopping" && (

// --- プラン表示 ---
function PlanView({ planByWeek, todayWeekStart, recipeMap, onPick, onClear }) {
  const [weeksCount, setWeeksCount] = useState(4);
  const sentinelRef = useRef(null);
  useEffect(() => {
    const el = sentinelRef.current;
    if (!el || typeof IntersectionObserver === "undefined") return;
    const obs = new IntersectionObserver(
      (entries) => {
        if (entries[0].isIntersecting) setWeeksCount((c) => c + 4);
      },
      { rootMargin: "800px 0px" }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  const weekStarts = useMemo(
    () => Array.from({ length: weeksCount }, (_, wi) => addDays(todayWeekStart, wi * 7)),
    [weeksCount, todayWeekStart]
  );
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
      {weekStarts.map((weekStart, wi) => (
        <WeekBlock
          key={toISODate(weekStart)}
          weekStart={weekStart}
          isFirst={wi === 0}
          plan={planByWeek[toISODate(weekStart)] || emptyWeek()}
          recipeMap={recipeMap}
          onPick={onPick}
          onClear={onClear}
        />
      ))}
      <div ref={sentinelRef} style={{ height: 1 }} />
      <div style={{ textAlign: "center", color: C.muted, fontSize: 12, padding: "8px 0 20px" }}>
        下にスクロールすると続きの週が表示されます
      </div>
    </div>
  );
}

// --- 買い物リストビュー ---
function ShoppingView({ list, extraItems, checked, onToggle, newExtra, setNewExtra, onAddExtra, onRemoveExtra }) {
  const grouped = useMemo(() => {
    const byName = {};
    list.forEach((item) => {
      byName[item.name] = {
        key: item.name,
        label: item.name,
        amounts: [...item.amounts],
        category: item.category || "その他",
        manualIds: []
      };
    });
    extraItems.forEach((item) => {
      const name = item.text.trim();
      if (byName[name]) {
        byName[name].manualIds.push(item.id);
      } else {
        byName[name] = {
          key: name,
          label: name,
          amounts: [],
          category: item.category || "その他",
          manualIds: [item.id]
        };
      }
    });
    const uncheckedEntries = [];
    const checkedEntries = [];
    Object.values(byName).forEach((entry) => {
      if (checked[safeCheckKey(entry.key)]) checkedEntries.push(entry);
      else uncheckedEntries.push(entry);
    });
    const byCat = {};
    uncheckedEntries.forEach((entry) => {
      if (!byCat[entry.category]) byCat[entry.category] = [];
      byCat[entry.category].push(entry);
    });
    const groups = CATEGORY_ORDER.filter((c) => {
      return byCat[c] && byCat[c].length;
    }).map((c) => ({ category: c, items: byCat[c] }));
    return { groups, doneEntries: checkedEntries };
  }, [list, extraItems, checked]);

  const allEntries = useMemo(
    () => [...grouped.groups.flatMap((g) => g.items), ...grouped.doneEntries],
    [grouped]
  );
  const total = allEntries.length;
  const doneCount = grouped.doneEntries.length;
  function removeEntry(entry) {
    entry.manualIds.forEach((id) => onRemoveExtra(id));
  }
  return (
    <div>
      <div
        style={{
          background: C.panel,
          border: `1px dashed ${C.line}`,
          borderRadius: 14,
          padding: "16px 16px 8px",
          position: "relative"
        }}
      >
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
          <span style={{ fontFamily: "'Kalam', cursive", fontSize: 20, color: C.mustard }}>買い物リスト</span>
          <span style={{ fontFamily: "'Space Mono', monospace", fontSize: 12, color: C.muted }}>{doneCount}/{total}</span>
        </div>
        {total === 0 ? (
          <p style={{ color: C.muted, fontSize: 13, padding: "10px 0 16px" }}>
            献立表にレシピを割り当てると、材料が自動でここに集まります。
          </p>
        ) : (
          <div style={{ display: "flex", flexDirection: "column" }}>
            {grouped.groups.map((group) => (
              <div key={group.category} style={{ marginBottom: 4 }}>
                <div
                  style={{
                    fontSize: 11,
                    fontWeight: 700,
                    color: C.tomato,
                    letterSpacing: 0.5,
                    padding: "10px 2px 4px",
                    textTransform: "uppercase"
                  }}
                >
                  {group.category}
                </div>
                {group.items.map((entry) => (
                  <ShoppingRow
                    key={entry.key}
                    checked={false}
                    onToggle={() => onToggle(safeCheckKey(entry.key))}
                    label={entry.label}
                    sub={entry.amounts.join(" + ")}
                    onRemove={entry.manualIds.length ? () => removeEntry(entry) : void 0}
                  />
                ))}
              </div>
            ))}
            {grouped.doneEntries.length > 0 && (
              <div style={{ marginBottom: 4 }}>
                <div
                  style={{
                    fontSize: 11,
                    fontWeight: 700,
                    color: C.muted,
                    letterSpacing: 0.5,
                    padding: "10px 2px 4px",
                    textTransform: "uppercase"
                  }}
                >
                  済み(24時間後に自動で消えます)
                </div>
                {grouped.doneEntries.map((entry) => (
                  <ShoppingRow
                    key={entry.key}
                    checked={true}
                    onToggle={() => onToggle(safeCheckKey(entry.key))}
                    label={entry.label}
                    sub={entry.amounts.join(" + ")}
                    onRemove={entry.manualIds.length ? () => removeEntry(entry) : void 0}
                  />
                ))}
              </div>
            )}
          </div>
        )}
        <div style={{ display: "flex", gap: 6, padding: "10px 0 4px" }}>
          <input
            value={newExtra}
            onChange={(e) => setNewExtra(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && onAddExtra()}
            placeholder="ほしいものを追加(例: 卵)"
            style={{ ...inputStyle, background: "rgba(255,255,255,0.03)" }}
          />
          <button onClick={onAddExtra} style={{ ...primaryBtnStyle, flex: "0 0 44px", padding: 0 }}>
            <Plus size={16} style={{ margin: "0 auto" }} />
          </button>
        </div>
      </div>
    </div>
  );
}

    <div
      style={{
        display: "flex",
        alignItems: "center",
        gap: 10,
        padding: "8px 2px",
        borderBottom: `1px dotted ${C.line}`
      }}
    >
      <button
        onClick={onToggle}
        style={{
          width: 19,
          height: 19,
          borderRadius: 5,
          border: `1.5px solid ${checked ? C.mustard : C.muted}`,
          background: checked ? C.mustard : "transparent",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          cursor: "pointer",
          flexShrink: 0
        }}
      >
        {checked && <Check size={12} color="#26210F" strokeWidth={3} />}
      </button>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div
          style={{
            fontSize: 14,
            color: checked ? C.muted : C.cream,
            textDecoration: checked ? "line-through" : "none"
          }}
        >
          {label}
        </div>
        {sub && <div style={{ fontSize: 11, color: C.muted, fontFamily: "'Space Mono', monospace" }}>{sub}</div>}
      </div>
      {onRemove && <button onClick={onRemove} style={iconBtnStyle}><X size={13} color={C.muted} /></button>}
    </div>
  );
}

// --- 共通ダイアログモーダル ---
function Modal({ title, onClose, children }) {
  return (
    <div
      onClick={onClose}
      style={{
        position: "fixed",
        inset: 0,
        background: "rgba(10,15,11,0.65)",
        display: "flex",
        alignItems: "flex-end",
        justifyContent: "center",
        zIndex: 50
      }}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          background: C.bg,
          border: `1px solid ${C.line}`,
          borderRadius: "18px 18px 0 0",
          padding: "18px 18px 26px",
          width: "100%",
          maxWidth: 720,
          maxHeight: "85vh",
          overflowY: "auto"
        }}
      >
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <span style={{ fontFamily: "'Kalam', cursive", fontSize: 19, color: C.mustard }}>{title}</span>
          <button onClick={onClose} style={iconBtnStyle}>
            <X size={18} color={C.muted} />
          </button>
        </div>
        {children}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
